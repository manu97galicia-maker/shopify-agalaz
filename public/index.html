<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agalaz Virtual Try-On — Shopify App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #000; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { text-align: center; max-width: 500px; padding: 40px 20px; }
    h1 { font-size: 32px; margin-bottom: 12px; }
    p { color: #999; font-size: 16px; margin-bottom: 24px; line-height: 1.5; }
    .badge { display: inline-block; background: #22c55e; color: #000; padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: 600; margin-bottom: 20px; }
    a { color: #fff; background: #333; padding: 12px 28px; border-radius: 8px; text-decoration: none; font-weight: 600; display: inline-block; transition: background 0.2s; }
    a:hover { background: #555; }
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">Shopify App</div>
    <h1>Agalaz Virtual Try-On</h1>
    <p>AI-powered virtual fitting room for your Shopify store. Let customers try on your clothes before buying.</p>
    <a href="https://agalaz.com">Visit Agalaz</a>
  </div>
</body>
</html>
