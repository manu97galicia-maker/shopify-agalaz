# Agalaz Virtual Try-On — Shopify App Configuration

name = "Agalaz Virtual Try-On"
client_id = "861f1e9da16336d99ba9d59f77b98807"
application_url = "https://shopify-agalaz-tryon.vercel.app"
embedded = true

[access_scopes]
scopes = "read_products,read_themes,write_themes"

[auth]
redirect_urls = ["https://shopify-agalaz-tryon.vercel.app/api/auth/callback"]

[webhooks]
api_version = "2024-10"

  [[webhooks.subscriptions]]
  topics = ["customers/data_request", "customers/redact", "shop/redact"]
  uri = "/api/webhooks/gdpr"
  compliance_topics = ["customers/data_request", "customers/redact", "shop/redact"]

  [[webhooks.subscriptions]]
  topics = ["app/uninstalled"]
  uri = "/api/webhooks/app-uninstalled"

[app_proxy]
url = "https://shopify-agalaz-tryon.vercel.app/api/proxy"
subpath = "tryon"
prefix = "apps"

[pos]
embedded = false

[[extensions]]
type = "theme"
name = "Agalaz Virtual Try-On"
handle = "agalaz-tryon"
